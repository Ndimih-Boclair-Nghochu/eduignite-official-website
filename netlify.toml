# ─── Netlify Configuration for EduIgnite ─────────────────────────────────────
# The Next.js app lives in the studio-main/ subdirectory of this repo.

[build]
  base    = "studio-main"
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"

  # ── Public env vars (safe to commit — no secrets here) ──────────────────────
  NEXT_PUBLIC_APP_NAME      = "EduIgnite"
  NEXT_PUBLIC_CONTACT_EMAIL = "eduignitecmr@gmail.com"

  # ── REQUIRED: override these in the Netlify dashboard ───────────────────────
  # Site → Environment variables → Add variable
  #
  #   NEXT_PUBLIC_API_URL   = https://your-backend.example.com/api/v1
  #   NEXT_PUBLIC_APP_URL   = https://your-site.netlify.app
  #   GROQ_API_KEY          = gsk_...   (server-side only — never prefix NEXT_PUBLIC_)
  #   GROQ_MODEL            = llama-3.3-70b-versatile   (optional — has a default)
  #
  # ── OPTIONAL: Firebase (if not using hardcoded config fallbacks) ─────────────
  #   NEXT_PUBLIC_FIREBASE_API_KEY              = AIza...
  #   NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN          = your-app.firebaseapp.com
  #   NEXT_PUBLIC_FIREBASE_PROJECT_ID           = your-project-id
  #   NEXT_PUBLIC_FIREBASE_APP_ID               = 1:...:web:...
  #   NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID  = 123456789

[[plugins]]
  package = "@netlify/plugin-nextjs"
